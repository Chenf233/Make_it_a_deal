<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SmartStation - 客户体验端</title>
</head>
<body>
    <h1>客户体验端 (Client)</h1>
    <button onclick="mockEntry()">模拟刷脸进门</button>
    <button onclick="mockExit()">模拟刷脸出门</button>
    
    <div style="margin-top: 20px;">
        <p>人脸预览流占位区：</p>
        <!-- <img src="/api/client/video_feed" width="640" height="480" style="border: 1px solid black;" /> -->
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws/client`);
        ws.onopen = () => console.log("✅ 客户端 WebSocket 已连接");
        ws.onmessage = (event) => {
            // 核心：监听并弹窗模拟硬件（蜂鸣器/开门/报警）
            const payload = JSON.parse(event.data);
            console.log("📥 收到硬件指令:", payload);
            alert(`【硬件触发】类型: ${payload.action_type}\n消息: ${payload.payload.msg}`);
        };

        function mockEntry() {
            fetch("/api/client/access/entry", { method: "POST" })
                .then(res => res.json())
                .then(data => console.log("进门返回:", data));
        }

        function mockExit() {
            fetch("/api/client/access/exit", { method: "POST" })
                .then(res => res.json())
                .then(data => console.log("出门返回:", data));
        }
    </script>
</body>
</html>
